apiVersion: apps/v1
kind: Deployment
metadata:
  name: periovoice-deployment
  labels:
    app: periovoice-ai
spec:
  replicas: 2 # Runs two copies of your app for high availability
  selector:
    matchLabels:
      app: periovoice-ai
  template:
    metadata:
      labels:
        app: periovoice-ai
    spec:
      containers:
      - name: periovoice-api
        image: Ashasarthiwika/periovoice-ai:latest # Your built Docker Hub image
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: periovoice-service
spec:
  type: LoadBalancer # Exposes your app to the internet/local network
  selector:
    app: periovoice-ai
  ports:
    - protocol: TCP
      port: 80       # Port accessible from the outside world
      targetPort: 8000 # Port your FastAPI is running inside the container